app-id: nl.hjdskes.gcolor3
command: gcolor3

# See https://gitlab.com/freedesktop-sdk/freedesktop-sdk/-/wikis/Releases#information-about-current-releases
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --metadata=X-DConf=migrate-path=/nl/hjdskes/gcolor3/

cleanup:
  - /share/man

modules:
  - name: libportal
    buildsystem: meson
    config-opts:
      - -Ddocs=false
      - -Dtests=false
      - -Dvapi=false
      - -Dbackend-gtk3=enabled
      - -Dbackend-gtk4=disabled
      - -Dbackend-qt5=disabled
      - -Dbackend-qt6=disabled
    sources:
      - type: git
        url: https://github.com/flatpak/libportal.git
        tag: 0.10.0
        commit: c23024018c8eb076549a1517fcb2d7f80d3e2ed5
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$

  - name: gcolor3
    buildsystem: meson
    sources:
      - type: git
        url: https://gitlab.gnome.org/World/gcolor3.git
        tag: v2.4.0
        commit: 7053f9e6a890175fc212df625e02ffbdce418146
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$

      - type: patch
        path: fix_appdata.patch

      - type: patch
        path: fix_new_libportal_dep.patch
